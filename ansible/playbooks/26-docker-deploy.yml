---
### ==== Docker Compose Deploy Playbook ==== ###
# Assumes `25-file-push.yml` already copied the compose project to:
#   /home/{{ user_devops }}/{{ service_name }}/docker-compose.yml

- name: Deploy docker compose stack
  hosts: servers
  gather_facts: false
  vars:
    ansible_user: "{{ user_devops }}"
    ansible_ssh_private_key_file: "{{ ssh_private_key }}"
    ansible_port: "{{ prod_ssh_port }}"
  roles:
    - role: docker-deploy
      tags: ['docker', 'compose']

