---
### ==== File Push Playbook ==== ###
# Pushes service filesystem payload to the remote host.
# home/ content is copied as the devops user.
# System config directories (etc/, opt/, ...) are copied with elevated privileges.

- name: Push service files
  hosts: servers
  gather_facts: false
  vars:
    ansible_user: "{{ user_devops }}"
    ansible_ssh_private_key_file: "{{ ssh_private_key }}"
    ansible_port: "{{ prod_ssh_port }}"
    project_root: "{{ playbook_dir }}/../.."
  roles:
    - role: file_push_homedir
      tags: ['file-push', 'homedir']
    - role: file_push_sysconfig
      tags: ['file-push', 'sysconfig']
