---
### ==== Post-deploy Playbook ==== ###
# Executes service-specific post-deploy.sh when present.

- name: Run post-deploy script
  hosts: servers
  gather_facts: false
  vars:
    ansible_user: "{{ user_devops }}"
    ansible_ssh_private_key_file: "{{ ssh_private_key }}"
    ansible_port: "{{ prod_ssh_port }}"
  roles:
    - role: ../roles/post-deploy-runner
      tags: ['post-deploy']
