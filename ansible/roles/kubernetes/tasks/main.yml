---
# Add Docker's official GPG key and repository
- name: Create directory for apt keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Install cri-dockerd
  ansible.builtin.get_url:
    url: https://github.com/Mirantis/cri-dockerd/releases/download/v0.3.21/cri-dockerd_0.3.21.3-0.debian-bookworm_amd64.deb
    dest: /usr/local/bin/cri-dockerd
    mode: '0755'
    force: true

- name: Download Kubernetes's official GPG key
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    mode: '0644'
    force: true

- name: Add Kubernetes repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg]
      https://pkgs.k8s.io/core:/stable:/v1.34/deb/
      /
    state: present
    filename: kubernetes

- name: Install Kubernetes
  ansible.builtin.apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present

- name: Initialize Kubernetes
  ansible.builtin.command:
    cmd: kubeadm init --cri-socket unix:///var/run/crio/crio.sock